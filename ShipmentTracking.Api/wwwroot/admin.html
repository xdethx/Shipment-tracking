<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Shipment Tracking</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <style>
    body { background-color: #f1f3f5; }
    .admin-wrap { max-width: 860px; margin: 40px auto; }
    .tracking-pill {
      font-family: monospace;
      font-size: 1.1rem;
      background: #e9ecef;
      border-radius: 6px;
      padding: 4px 10px;
    }
  </style>
</head>
<body>
  <div class="container admin-wrap">
    <h1 class="fw-bold mb-1">Admin Panel</h1>
    <p class="text-muted mb-4">Shipment management — for internal use only.</p>

    <!-- API Key ─────────────────────────────────────────────────────────── -->
    <div class="card mb-4 border-warning">
      <div class="card-body">
        <label for="apiKey" class="form-label fw-semibold">API Key</label>
        <input id="apiKey"
               type="password"
               class="form-control"
               placeholder="Enter API key (not stored anywhere)"
               autocomplete="off" />
        <div class="form-text">Read on every request — never committed or stored.</div>
      </div>
    </div>

    <!-- Card A — Create shipment ────────────────────────────────────────── -->
    <div class="card mb-4">
      <div class="card-header fw-semibold">A — Create Shipment</div>
      <div class="card-body">
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Sender name</label>
            <input id="senderName" type="text" class="form-control" placeholder="Ahmet Yılmaz" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Receiver name</label>
            <input id="receiverName" type="text" class="form-control" placeholder="Fatma Kaya" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Origin</label>
            <input id="origin" type="text" class="form-control" placeholder="Istanbul" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Destination</label>
            <input id="destination" type="text" class="form-control" placeholder="Ankara" />
          </div>
        </div>
        <button id="createBtn" class="btn btn-success">Create Shipment</button>
        <div id="createResult" class="mt-3"></div>
      </div>
    </div>

    <!-- Card B — All shipments ──────────────────────────────────────────── -->
    <div class="card mb-4">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-semibold">B — All Shipments</span>
        <button id="refreshBtn" class="btn btn-sm btn-outline-primary">Refresh</button>
      </div>
      <div class="card-body p-0">
        <div id="listResult" class="p-3 text-muted">Click Refresh to load.</div>
      </div>
    </div>

    <!-- Card C — Update status ──────────────────────────────────────────── -->
    <div class="card mb-4">
      <div class="card-header fw-semibold">C — Update Status</div>
      <div class="card-body">
        <div class="row g-3 mb-3">
          <div class="col-md-5">
            <label class="form-label">Tracking number</label>
            <input id="updateTn" type="text" class="form-control" placeholder="TR20260623-XXXXXX" />
          </div>
          <div class="col-md-4">
            <label class="form-label">New status</label>
            <select id="newStatus" class="form-select">
              <option value="Created">Created</option>
              <option value="AtCustoms">AtCustoms</option>
              <option value="InTransit">InTransit</option>
              <option value="OutForDelivery">OutForDelivery</option>
              <option value="Delivered">Delivered</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Note (optional)</label>
            <input id="statusNote" type="text" class="form-control" placeholder="e.g. Cleared customs" />
          </div>
        </div>
        <button id="updateBtn" class="btn btn-primary">Update Status</button>
        <div id="updateResult" class="mt-3"></div>
      </div>
    </div>
  </div><!-- /.admin-wrap -->

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>
  <script>
    // ── Helpers ─────────────────────────────────────────────────────────────
    function esc(str) {
      return $('<div>').text(String(str)).html();
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString();
    }

    function statusBadgeClass(status) {
      switch (status) {
        case 'Delivered':        return 'bg-success';
        case 'InTransit':        return 'bg-info text-dark';
        case 'OutForDelivery':   return 'bg-primary';
        case 'AtCustoms':        return 'bg-warning text-dark';
        default:                 return 'bg-secondary'; // Created
      }
    }

    // Returns the X-Api-Key header object, read fresh from the input each time.
    function apiHeaders() {
      return { 'X-Api-Key': $('#apiKey').val() };
    }

    function showAlert(containerId, type, html) {
      $('#' + containerId).html(
        '<div class="alert alert-' + type + ' mb-0">' + html + '</div>'
      );
    }

    function authError(containerId) {
      showAlert(containerId, 'danger', 'Missing or wrong API key (401).');
    }

    // ── Card A — Create shipment ─────────────────────────────────────────────
    function createShipment() {
      var body = {
        senderName:   $.trim($('#senderName').val()),
        receiverName: $.trim($('#receiverName').val()),
        origin:       $.trim($('#origin').val()),
        destination:  $.trim($('#destination').val())
      };

      if (!body.senderName || !body.receiverName || !body.origin || !body.destination) {
        showAlert('createResult', 'warning', 'All four fields are required.');
        return;
      }

      $.ajax({
        url: '/api/shipments',
        method: 'POST',
        contentType: 'application/json',
        headers: apiHeaders(),
        data: JSON.stringify(body)
      })
      .done(function (data, _status, jqXHR) {
        if (jqXHR.status === 201) {
          showAlert('createResult', 'success',
            'Shipment created! Tracking number: ' +
            '<span class="tracking-pill">' + esc(data.trackingNumber) + '</span>'
          );
          // Clear form
          $('#senderName, #receiverName, #origin, #destination').val('');
        }
      })
      .fail(function (jqXHR) {
        if (jqXHR.status === 401) {
          authError('createResult');
        } else if (jqXHR.status === 400) {
          showAlert('createResult', 'danger', 'Validation error: ' + esc(jqXHR.responseText));
        } else {
          showAlert('createResult', 'danger', 'Unexpected error (' + jqXHR.status + ').');
        }
      });
    }

    // ── Card B — List all shipments ──────────────────────────────────────────
    function listShipments() {
      $('#listResult').html('<p class="p-3 text-muted mb-0">Loading…</p>');

      $.ajax({
        url: '/api/shipments',
        method: 'GET',
        headers: apiHeaders()
      })
      .done(function (data) {
        if (!data || data.length === 0) {
          $('#listResult').html('<p class="p-3 text-muted mb-0">No shipments yet.</p>');
          return;
        }

        var rows = data.map(function (s) {
          return (
            '<tr>' +
              '<td><code>' + esc(s.trackingNumber) + '</code></td>' +
              '<td>' + esc(s.senderName) + '</td>' +
              '<td>' + esc(s.receiverName) + '</td>' +
              '<td>' + esc(s.origin) + '</td>' +
              '<td>' + esc(s.destination) + '</td>' +
              '<td><span class="badge ' + statusBadgeClass(s.status) + '">' + esc(s.status) + '</span></td>' +
              '<td class="text-nowrap">' + esc(formatDate(s.createdAt)) + '</td>' +
            '</tr>'
          );
        });

        $('#listResult').html(
          '<div class="table-responsive">' +
            '<table class="table table-sm table-hover mb-0">' +
              '<thead class="table-light">' +
                '<tr>' +
                  '<th>Tracking #</th><th>Sender</th><th>Receiver</th>' +
                  '<th>Origin</th><th>Destination</th><th>Status</th><th>Created</th>' +
                '</tr>' +
              '</thead>' +
              '<tbody>' + rows.join('') + '</tbody>' +
            '</table>' +
          '</div>'
        );
      })
      .fail(function (jqXHR) {
        if (jqXHR.status === 401) {
          $('#listResult').html(
            '<div class="alert alert-danger m-3 mb-0">Missing or wrong API key (401).</div>'
          );
        } else {
          $('#listResult').html(
            '<div class="alert alert-danger m-3 mb-0">Unexpected error (' + jqXHR.status + ').</div>'
          );
        }
      });
    }

    // ── Card C — Update status ───────────────────────────────────────────────
    function updateStatus() {
      var tn     = $.trim($('#updateTn').val());
      var status = $('#newStatus').val();
      var note   = $.trim($('#statusNote').val());

      if (!tn) {
        showAlert('updateResult', 'warning', 'Please enter a tracking number.');
        return;
      }

      var body = { newStatus: status };
      if (note) { body.note = note; }

      $.ajax({
        url: '/api/shipments/' + encodeURIComponent(tn) + '/status',
        method: 'PUT',
        contentType: 'application/json',
        headers: apiHeaders(),
        data: JSON.stringify(body)
      })
      .done(function (data) {
        showAlert('updateResult', 'success',
          'Status updated to ' +
          '<span class="badge ' + statusBadgeClass(data.status) + '">' + esc(data.status) + '</span>.'
        );
      })
      .fail(function (jqXHR) {
        if (jqXHR.status === 400) {
          // Server returns a plain-text message (not JSON) for invalid transitions.
          showAlert('updateResult', 'danger', esc(jqXHR.responseText));
        } else if (jqXHR.status === 404) {
          showAlert('updateResult', 'warning',
            'Tracking number "' + esc(tn) + '" not found.'
          );
        } else if (jqXHR.status === 401) {
          authError('updateResult');
        } else {
          showAlert('updateResult', 'danger', 'Unexpected error (' + jqXHR.status + ').');
        }
      });
    }

    // ── Event bindings ───────────────────────────────────────────────────────
    $('#createBtn').on('click', createShipment);
    $('#refreshBtn').on('click', listShipments);
    $('#updateBtn').on('click', updateStatus);
  </script>
</body>
</html>
