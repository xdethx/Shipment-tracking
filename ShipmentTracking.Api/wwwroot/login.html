<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login — Shipment Tracking</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <style>
    body {
      background-color: #f1f3f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card { width: 100%; max-width: 400px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-card mx-auto">
      <div class="text-center mb-4">
        <h4 class="fw-bold mb-0">Shipment Tracking</h4>
        <small class="text-muted">Admin Portal</small>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" type="text" class="form-control"
                   autocomplete="username" placeholder="admin" />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input id="password" type="password" class="form-control"
                   autocomplete="current-password" />
          </div>
          <button id="loginBtn" class="btn btn-primary w-100">Log in</button>
          <div id="loginResult" class="mt-3"></div>
        </div>
      </div>
      <p class="text-center mt-3">
        <a href="/" class="text-muted small">← Public tracking page</a>
      </p>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>
  <script>
    // If a valid (non-expired) token is already stored, skip the login form.
    (function () {
      var token = sessionStorage.getItem('st_token');
      if (token && !isTokenExpired(token)) {
        window.location.href = '/admin.html';
      }
    })();

    // Decode the JWT payload (base64url → JSON) and check the exp claim.
    // This is a CLIENT-SIDE convenience check only — the server always
    // re-validates the signature and expiry on every request.
    function isTokenExpired(token) {
      try {
        var b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        var payload = JSON.parse(atob(b64));
        return (Date.now() / 1000) >= payload.exp;
      } catch (e) {
        return true; // malformed token → treat as expired
      }
    }

    function login() {
      var username = $.trim($('#username').val());
      var password = $('#password').val();

      if (!username || !password) {
        $('#loginResult').html(
          '<div class="alert alert-warning mb-0">Username and password are required.</div>'
        );
        return;
      }

      $('#loginBtn').prop('disabled', true).text('Logging in…');
      $('#loginResult').empty();

      $.ajax({
        url: '/api/auth/login',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ username: username, password: password })
      })
      .done(function (data) {
        // Store the JWT in sessionStorage.
        //
        // sessionStorage vs localStorage trade-off:
        //   sessionStorage — cleared when the browser tab is closed.
        //     Better for shared/staff machines; each session requires re-login.
        //   localStorage   — persists across tab closes and browser restarts.
        //     More convenient but increases the window where a stolen token
        //     can be replayed if someone accesses the machine later.
        //   Both are equally vulnerable to XSS — a script on the page can
        //   read either one. For an internal staff tool, sessionStorage is
        //   the safer default.
        sessionStorage.setItem('st_token', data.token);
        window.location.href = '/admin.html';
      })
      .fail(function (jqXHR) {
        $('#loginBtn').prop('disabled', false).text('Log in');
        if (jqXHR.status === 401) {
          $('#loginResult').html(
            '<div class="alert alert-danger mb-0">Invalid username or password.</div>'
          );
        } else {
          $('#loginResult').html(
            '<div class="alert alert-danger mb-0">Unexpected error (' + jqXHR.status + '). Try again.</div>'
          );
        }
      });
    }

    $('#loginBtn').on('click', login);
    // Allow submitting with Enter from the password field.
    $('#password').on('keydown', function (e) {
      if (e.key === 'Enter') { login(); }
    });
  </script>
</body>
</html>
