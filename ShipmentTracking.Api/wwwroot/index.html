<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shipment Tracker</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <style>
    body { background-color: #f8f9fa; }
    .tracker-card { max-width: 680px; margin: 60px auto; }
    .timeline-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #6c757d;
      flex-shrink: 0;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tracker-card">
      <h1 class="mb-1 fw-bold">Track Your Shipment</h1>
      <p class="text-muted mb-4">Enter your tracking number to see the latest status.</p>

      <div class="input-group mb-3">
        <input id="trackingInput"
               type="text"
               class="form-control form-control-lg"
               placeholder="e.g. TR20260623-7MZZR5"
               autocomplete="off" />
        <button id="trackBtn" class="btn btn-primary btn-lg" type="button">Track</button>
      </div>

      <div id="result"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>
  <script>
    // ── Helpers ─────────────────────────────────────────────────────────────
    function esc(str) {
      return $('<div>').text(str).html();
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString();
    }

    function statusBadgeClass(status) {
      switch (status) {
        case 'Delivered':        return 'bg-success';
        case 'InTransit':        return 'bg-info text-dark';
        case 'OutForDelivery':   return 'bg-primary';
        case 'AtCustoms':        return 'bg-warning text-dark';
        default:                 return 'bg-secondary'; // Created
      }
    }

    function showAlert(type, message) {
      $('#result').html(
        '<div class="alert alert-' + type + '">' + esc(message) + '</div>'
      );
    }

    // ── Render a successful tracking response ────────────────────────────────
    function renderTracking(data) {
      var badgeClass = statusBadgeClass(data.status);

      var historyHtml = '';
      if (data.history && data.history.length > 0) {
        var items = data.history.map(function (h) {
          var note = h.note ? '<br><small class="text-muted">' + esc(h.note) + '</small>' : '';
          return (
            '<li class="list-group-item d-flex align-items-start gap-3">' +
              '<div class="timeline-dot mt-1"></div>' +
              '<div>' +
                '<span class="badge ' + statusBadgeClass(h.status) + '">' + esc(h.status) + '</span>' +
                note +
                '<br><small class="text-muted">' + esc(formatDate(h.createdAt)) + '</small>' +
              '</div>' +
            '</li>'
          );
        });
        historyHtml =
          '<h6 class="mt-4 mb-2">Status Timeline</h6>' +
          '<ul class="list-group">' + items.join('') + '</ul>';
      }

      $('#result').html(
        '<div class="card shadow-sm">' +
          '<div class="card-body">' +
            '<div class="d-flex justify-content-between align-items-start mb-3">' +
              '<div>' +
                '<h5 class="card-title mb-0 fw-semibold">' + esc(data.trackingNumber) + '</h5>' +
                '<small class="text-muted">Created ' + esc(formatDate(data.createdAt)) + '</small>' +
              '</div>' +
              '<span class="badge fs-6 ' + badgeClass + '">' + esc(data.status) + '</span>' +
            '</div>' +
            '<p class="mb-1">' +
              '<strong>Route:</strong> ' + esc(data.origin) + ' &rarr; ' + esc(data.destination) +
            '</p>' +
            historyHtml +
          '</div>' +
        '</div>'
      );
    }

    // ── Main action ──────────────────────────────────────────────────────────
    function trackShipment() {
      var tn = $.trim($('#trackingInput').val());
      if (!tn) {
        showAlert('warning', 'Please enter a tracking number.');
        return;
      }

      $('#result').html('<p class="text-muted">Looking up <strong>' + esc(tn) + '</strong>…</p>');

      $.ajax({
        url: '/api/track/' + encodeURIComponent(tn),
        method: 'GET'
      })
      .done(function (data) {
        renderTracking(data);
      })
      .fail(function (jqXHR) {
        if (jqXHR.status === 404) {
          showAlert('warning', 'No shipment found for tracking number "' + tn + '".');
        } else {
          showAlert('danger', 'Something went wrong. Please try again later.');
        }
      });
    }

    // ── Event bindings ───────────────────────────────────────────────────────
    $('#trackBtn').on('click', trackShipment);

    $('#trackingInput').on('keydown', function (e) {
      if (e.key === 'Enter') { trackShipment(); }
    });

    // Mount the customs assistant floating widget (bottom-right corner) after the DOM is ready.
    // Copy-paste embed snippet for other pages lives in assistant-widget.html's header comment.
    $(function () { $('#assistant-widget-mount').load('/assistant-widget.html'); });
  </script>

  <!-- Widget mount point. The floating 💬 button is injected here at DOMReady.
       To add the widget to any other Bootstrap + jQuery page, paste before </body>:
         <div id="assistant-widget-mount"></div>
         <script>$(function(){ $('#assistant-widget-mount').load('/assistant-widget.html'); });</script>
  -->
  <div id="assistant-widget-mount"></div>
</body>
</html>
