<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customs Assistant — Shipment Tracking</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <style>
    body { background-color: #f8f9fa; }
  </style>
</head>
<body>
  <div class="container" style="max-width:680px; margin-top:60px;">
    <h1 class="fw-bold mb-1">Customs Assistant</h1>
    <p class="text-muted mb-4">
      Ask about customs statuses, required documents, and shipment delays.<br>
      Click the <strong>💬</strong> button in the bottom-right corner to open the chat.
    </p>
    <p><a href="/" class="text-muted small">← Public tracking page</a></p>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>

  <!-- Mount the assistant widget. The widget relies on Bootstrap CSS and jQuery
       already loaded above — it does not include them again. -->
  <div id="assistant-widget-mount"></div>
  <script>
    $(function () { $('#assistant-widget-mount').load('/assistant-widget.html'); });
  </script>
</body>
</html>
